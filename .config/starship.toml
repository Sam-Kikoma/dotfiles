# ---------------- OS ----------------
[os]
format = '[î‚¶]($style)[$symbol](bg:$style fg:text_color)[î‚´]($style)'
style = 'os'
disabled = false

# ---------------- USERNAME ----------------
[username]
style_user = 'os'
style_root = 'os_admin'
format = '[î‚¶]($style)[$user](bg:$style fg:text_color)[î‚´]($style)'
disabled = false
show_always = true

# ---------------- DIRECTORY ----------------
[directory]
format = " [î‚¶](fg:directory)[ïپ¼  $path ]($style)[$read_only]($read_only_style)[î‚´](fg:directory)"
truncation_length = 2
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
truncation_symbol = "â€¦/"
truncate_to_repo = true
read_only =" î©µ "

# ---------------- TIME ----------------
[time]
disabled = false
format = " [î‚¶](fg:time)[ï€— $time]($style)[î‚´](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

# ---------------- CMD DURATION ----------------
[cmd_duration]
format = " [î‚¶](fg:duration)[ï‰” $duration]($style)[î‚´](fg:duration)"
style = "fg:text_light bg:duration"
min_time = 500

# ---------------- GIT ----------------
[git_branch]
format = " [î‚¶](fg:git)[$symbol$branch](fg:text_light bg:git)[î‚´](fg:git)"
symbol = "ïگک "

[git_status]
format = '([ î‚¶](fg:git_status)[ $all_status$ahead_behind ]($style)[î‚´](fg:git_status))'
style = "fg:text_light bg:git_status"

# ---------------- DOCKER ----------------
[docker_context]
