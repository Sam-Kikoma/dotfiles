"$schema" = 'https://starship.rs/config-schema.json'

format = """\
[в•ӯв•ҙ](fg:arrow)\
$os\
$username\
$directory\
$time\
(\
    $git_branch\
    $git_status\
)\
(\
    $python\
    $conda\
    $nodejs\
    $golang\
    $rust\
    $java\
    $c\
)\
$docker_context\
$cmd_duration
[в•°в”Җ](fg:arrow)$character\
"""

add_newline = true
palette = "light"

# ---------------- PALETTES ----------------
[palettes.old]
arrow = "#353535"
os = "#3778BF"
os_admin = "#6A040F"
directory = "#3F37C9"
node = "green"
time = "#177E89"
git = "#B02B10"
git_status = "#8B1D2C"
python = "#3776AB"
conda = "#3EB049"
java = "#861215"
rust = "#C33C00"
clang = "#00599D"
duration = "yellow"
text_color = "#EDF2F4"
text_light = "#EDF2F4"

[palettes.normal]
arrow = "#353535"
os = "#2C3032"
os_admin = "#6A040F"
directory = "#363C3E"
time = "#474D5C"
node = "#F1DEA9"
git = "#D0DBDA"
git_status = "#DFEBED"
python = "#F5CB5C"
conda = "#3EB049"
java = "#861215"
rust = "#C33C00"
clang = "#00599D"
duration = "#F4FBFF"
text_color = "#EDF2F4"
text_light = "#26272A"

[palettes.light]
arrow = "#353535"
os = "#F7768E"
os_admin = "#ACBEF1"
directory = "#FF9578"
time = "#FFDC72"
git = "#F5F5F5"
git_status = "#72FFD5"
clang = "#67E3FF"
java = "#FF52A3"
python = "#B4F9F8"
node = "#81FF85"
conda = "#BAF5C0"
duration = "#91FFE7"
text_color = "#26272A"
text_light = "#26272A"

[palettes.minimal]
arrow     = "#555555"
os        = "#2E2E2E"
os_admin  = "#2E2E2E"
directory = "#3A3A3A"
node      = "#444444"
time      = "#404040"
git       = "#383838"
git_status= "#303030"
python    = "#424242"
conda     = "#3E3E3E"
java      = "#383838"
rust      = "#3C3C3C"
clang     = "#404040"
duration  = "#484848"
text_color = "#E8E8E8"
text_light = "#C0C0C0"

# ---------------- OS ----------------
[os]
format = '[оӮ¶]($style)[$symbol](bg:$style fg:text_color)[оӮҙ]($style)'
style = 'os'
disabled = false

# ---------------- USERNAME ----------------
[username]
style_user = 'os'
style_root = 'os_admin'
format = '[оӮ¶]($style)[$user](bg:$style fg:text_color)[оӮҙ]($style)'
disabled = false
show_always = true

# ---------------- DIRECTORY ----------------
[directory]
format = " [оӮ¶](fg:directory)[пҒј  $path ]($style)[$read_only]($read_only_style)[оӮҙ](fg:directory)"
truncation_length = 2
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
read_only =" о©ө "

# ---------------- TIME ----------------
[time]
disabled = false
format = " [оӮ¶](fg:time)[пҖ— $time]($style)[оӮҙ](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

# ---------------- CMD DURATION ----------------
[cmd_duration]
format = " [оӮ¶](fg:duration)[пү” $duration]($style)[оӮҙ](fg:duration)"
style = "fg:text_light bg:duration"
min_time = 500

# ---------------- GIT ----------------
[git_branch]
format = " [оӮ¶](fg:git)[$symbol$branch](fg:text_light bg:git)[оӮҙ](fg:git)"
symbol = "пҗҳ "

[git_status]
format = '([ оӮ¶](fg:git_status)[ $all_status$ahead_behind ]($style)[оӮҙ](fg:git_status))'
style = "fg:text_light bg:git_status"

# ---------------- DOCKER ----------------
[docker_context]
symbol = "пҢҲ "
format = "[ оӮ¶](fg:conda)[$symbol$context]($style)[оӮҙ](fg:conda)"
style = "bg:conda fg:text_color"
disabled = false

# ---------------- LANGUAGES ----------------

[nodejs]
format = "[ оӮ¶](fg:node)[$symbol$version]($style)[оӮҙ](fg:node)"
style = "bg:node fg:text_light"
symbol = "оңҳ "
version_format = "${raw}"
disabled = false

[python]
format = '[ оӮ¶](fg:python)[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\))]($style)[оӮҙ](fg:python)'
symbol = "оҳҶ "
version_format = "${raw}"
style = "fg:text_light bg:python"
disabled = false

[conda]
format = "[ оӮ¶](fg:conda)[$symbol$environment]($style)[оӮҙ](fg:conda)"
style = "bg:conda fg:text_color"
ignore_base = false
disabled = false
symbol = "п„Ң "

[golang]
format = "[ оӮ¶](fg:node)[оҳ§ $version]($style)[оӮҙ](fg:node)"
style = "bg:node fg:text_light"
version_format = "${raw}"
disabled = false

[rust]
format = "[ оӮ¶](fg:rust)[$symbol$version](bg:rust fg:text_color)[оӮҙ](fg:rust)"
symbol = "оҡӢ "
version_format = "${raw}"
disabled = false

[java]
format = "[ оӮ¶](fg:java)[$symbol$version](bg:java fg:text_color)[оӮҙ](fg:java)"
version_format = "${raw}"
symbol = "оү– "
disabled = false

[c]
format = "[ оӮ¶](fg:clang)[$symbol($version(-$name) )](bg:clang fg:text_color)[оӮҙ](fg:clang)"
symbol = "оҳһ "
version_format = "${raw}"
disabled = false

